services:
  postgres:
    env_file:
      - path: ./.env.production
        required: true
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}

  backend:
    env_file:
      - path: ./.env.production
        required: true
    environment:
      NIKKI_ADDR: ${NIKKI_ADDR:-:8080}
      NIKKI_DATABASE_URL: ${NIKKI_DATABASE_URL:?NIKKI_DATABASE_URL is required}
      NIKKI_UPLOAD_DIR: ${NIKKI_UPLOAD_DIR:-/uploads}
      NIKKI_PUBLIC_UPLOAD_BASE: ${NIKKI_PUBLIC_UPLOAD_BASE:-/uploads}
      NIKKI_LOG_FORMAT: ${NIKKI_LOG_FORMAT:-json}
      NIKKI_LOG_LEVEL: ${NIKKI_LOG_LEVEL:-info}
      NIKKI_COOKIE_SECURE: ${NIKKI_COOKIE_SECURE:-true}
      NIKKI_CORS_ALLOWED_ORIGINS: ${NIKKI_CORS_ALLOWED_ORIGINS:?NIKKI_CORS_ALLOWED_ORIGINS is required}
      NIKKI_SIGNUP_ENABLED: ${NIKKI_SIGNUP_ENABLED:-false}
      NIKKI_FIRST_USER_SETUP_ENABLED: ${NIKKI_FIRST_USER_SETUP_ENABLED:-false}
      NIKKI_FIRST_USER_BOOTSTRAP_TOKEN: ${NIKKI_FIRST_USER_BOOTSTRAP_TOKEN:?NIKKI_FIRST_USER_BOOTSTRAP_TOKEN is required}
      NIKKI_AUTH_RATE_LIMIT_IP_ATTEMPTS: ${NIKKI_AUTH_RATE_LIMIT_IP_ATTEMPTS:-10}
      NIKKI_AUTH_RATE_LIMIT_ACCOUNT_ATTEMPTS: ${NIKKI_AUTH_RATE_LIMIT_ACCOUNT_ATTEMPTS:-5}
      NIKKI_AUTH_RATE_LIMIT_WINDOW: ${NIKKI_AUTH_RATE_LIMIT_WINDOW:-5m}
      NIKKI_AUTH_RATE_LIMIT_LOCKOUT: ${NIKKI_AUTH_RATE_LIMIT_LOCKOUT:-15m}
      NIKKI_AUTH_RATE_LIMIT_MAX_ENTRIES: ${NIKKI_AUTH_RATE_LIMIT_MAX_ENTRIES:-2048}
      NIKKI_AUDIT_RETENTION_DAYS: ${NIKKI_AUDIT_RETENTION_DAYS:-180}
      NIKKI_IP_EXTRACTOR_MODE: ${NIKKI_IP_EXTRACTOR_MODE:-direct}
      NIKKI_TRUSTED_PROXY_CIDRS: ${NIKKI_TRUSTED_PROXY_CIDRS:-}
      NIKKI_STRIP_IMAGE_METADATA: ${NIKKI_STRIP_IMAGE_METADATA:-true}
    ports: !override []
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/api/health | grep -q '\"status\":\"ok\"'"]

  frontend:
    env_file:
      - path: ./.env.production
        required: true
    ports: !override
      - "${NIKKI_FRONTEND_BIND:-127.0.0.1}:${NIKKI_FRONTEND_PORT:-8089}:80"
